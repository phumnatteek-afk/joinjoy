<!DOCTYPE html>
<html lang="th">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notifications – JoinJoy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/notification.css">
</head>
<body>
<div class="mobile">
  <div class="blob1"></div>
  <div class="blob2"></div>

  <div class="topbar">
    <a href="home.html" class="back-btn">&#8249;</a>
    <div class="logo">JoinJoy</div>
  </div>

  <div class="page-title">Notifications</div>
  <div class="section-label">Today</div>

  <div class="notif-list" id="notif-list">
    <div class="notif-item">
      <div class="dot"></div>
      <div class="notif-icon">
        <svg viewBox="0 0 24 24"><path d="M15 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm-9-2V8H4v2H2v2h2v2h2v-2h2v-2H6zm9 4c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
      </div>
      <div class="notif-body">
        <div class="notif-title">New join request!</div>
        <a class="notif-link" href="#">View Details</a>
      </div>
      <div class="notif-time">Just now</div>
    </div>
  </div>

  <div class="empty-state" id="empty-state">
    <svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6V11c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
    <p>No notifications yet.<br>Check back later!</p>
  </div>
</div>
<script>
  const list = document.getElementById('notif-list');
  if (list.querySelectorAll('.notif-item').length === 0) {
    list.style.display = 'none';
    document.getElementById('empty-state').style.display = 'flex';
  }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JoinJoy — Profile</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Kanit:wght@400;600;700&display=swap" rel="stylesheet"/>

  <link rel="stylesheet" href="../css/profile-page.css" />
  <link rel="stylesheet" href="../css/homepage.css">
</head>
<body class="profile-screen">

  <div class="toast" id="toast"></div>

  <!-- HEADER -->
  <header class="header">
    <div class="logo-row">
      <div class="logo">
        <a href="../html/homepage.html">
          <img src="../img/joinjoylogo.png" alt="JoinJoy"
               onerror="this.style.display='none';this.nextElementSibling.style.display='inline';"/>
          <span class="logo-text" style="display:none;">JoinJoy</span>
        </a>
      </div>
    </div>
  </header>

  <!-- CONTENT -->
  <main class="profile-page-wrap">
    <section class="profile-card-box">
      <div class="profile-card-top-bg"></div>

      <div class="profile-hero-box">
        <div class="profile-avatar-box">
          <img id="profileAvatar" class="profile-avatar-img"
               src="" alt="avatar" style="display:none;"
               onerror="this.style.display='none';"/>
        </div>
        <div class="profile-name-row">
          <h2 class="profile-user-name" id="profileName">—</h2>
          <span class="profile-verified-badge">✔</span>
        </div>
        <p class="profile-user-bio" id="profileBio"></p>
      </div>

      <div class="profile-info-grid">
        <div class="profile-info-card">
          <div class="profile-info-label">First name:</div>
          <div class="profile-info-value" id="firstName">—</div>
        </div>
        <div class="profile-info-card">
          <div class="profile-info-label">Last name:</div>
          <div class="profile-info-value" id="lastName">—</div>
        </div>
        <div class="profile-info-card">
          <div class="profile-info-label">Birthday date:</div>
          <div class="profile-info-value" id="birthday">—</div>
        </div>
        <div class="profile-info-card">
          <div class="profile-info-label">Gender:</div>
          <div class="profile-info-value" id="gender">—</div>
        </div>
        <div class="profile-info-card profile-info-card-full">
          <div class="profile-info-label">Faculty:</div>
          <div class="profile-info-value" id="faculty">—</div>
        </div>
        <div class="profile-info-card profile-info-card-full">
          <div class="profile-info-label">Social Media:</div>
          <div class="profile-info-value" id="social">—</div>
        </div>
      </div>

      <div class="profile-tags-section">
        <div class="profile-tags-title">Tags:</div>
        <div class="profile-tags-list" id="tagList"></div>
      </div>

      <!-- Edit Profile button -->
      <button class="btn-edit-profile" id="btnOpenEdit">✏️  Edit Profile</button>
    </section>
  </main>

  <!-- EDIT MODAL -->
  <div class="modal-overlay" id="editModal">
    <div class="modal-sheet">
      <div class="modal-scroll-area">
      <p class="modal-title">Edit Profile</p>

      <div class="modal-row">
        <div class="modal-field">
          <label>First name</label>
          <input type="text" id="editFirstName" placeholder="First name"/>
        </div>
        <div class="modal-field">
          <label>Last name</label>
          <input type="text" id="editLastName" placeholder="Last name"/>
        </div>
      </div>

      <div class="modal-field">
        <label>Bio</label>
        <textarea id="editBio" placeholder="Tell us about yourself…"></textarea>
      </div>

      <div class="modal-row">
        <div class="modal-field">
          <label>Birthday date</label>
          <input type="date" id="editBirthDate"/>
        </div>
        <div class="modal-field">
          <label>Gender</label>
          <select id="editGender">
            <option value="">— select —</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>
          </select>
        </div>
      </div>

      <div class="modal-field">
        <label>Faculty</label>
        <input type="text" id="editFaculty" placeholder="e.g. ICT"/>
      </div>

      <div class="modal-field">
        <label>Social Media</label>
        <input type="text" id="editSocialMedia" placeholder="e.g. @username"/>
      </div>

      <div class="modal-field">
        <label>Tags <span style="font-weight:400;color:#bbb;font-size:11px;">select all that apply</span></label>
        <div class="tag-chips-grid" id="tagsEditor">
          <label class="tag-chip-option"><input type="checkbox" value="Beach"/>🏖️ Beach</label>
          <label class="tag-chip-option"><input type="checkbox" value="Cafe"/>☕ Cafe</label>
          <label class="tag-chip-option"><input type="checkbox" value="Pet"/>🐾 Pet</label>
          <label class="tag-chip-option"><input type="checkbox" value="Concert"/>🎵 Concert</label>
          <label class="tag-chip-option"><input type="checkbox" value="1-Day Trip"/>🗺️ 1-Day Trip</label>
          <label class="tag-chip-option"><input type="checkbox" value="Sport"/>⚽ Sport</label>
          <label class="tag-chip-option"><input type="checkbox" value="Mall"/>🛍️ Mall</label>
          <label class="tag-chip-option"><input type="checkbox" value="Market"/>🧺 Market</label>
          <label class="tag-chip-option"><input type="checkbox" value="Restaurant"/>🍽️ Restaurant</label>
          <label class="tag-chip-option"><input type="checkbox" value="Buffet"/>🥘 Buffet</label>
          <label class="tag-chip-option"><input type="checkbox" value="Party"/>🎉 Party</label>
          <label class="tag-chip-option"><input type="checkbox" value="Shopping"/>🛒 Shopping</label>
          <label class="tag-chip-option"><input type="checkbox" value="Board game"/>🎲 Board game</label>
        </div>
      </div>
    </div><!-- end modal-scroll-area -->

      <div class="modal-footer">
        <button class="btn-cancel" id="btnCancelEdit">Cancel</button>
        <button class="btn-save"   id="btnSaveEdit">Save Changes</button>
      </div>
    </div><!-- end modal-sheet -->
  </div><!-- end modal-overlay -->

  <!-- NAVBAR -->
  <nav id="mainnav" class="mainnav" aria-label="Main navigation">
    <ul class="mainmenu">
      <li class="menu-item">
        <a href="../html/homepage.html">

          </svg>
          <span>Home</span>

      </li>
      <li class="menu-item">
        <a href="../html/Board.html">
          <svg width="27" height="23" viewBox="0 0 27 23" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M9.92857 1H4.57143C3.58519 1 2.78571 1.79947 2.78571 2.78571V15.2857H24.2143V2.78571C24.2143 1.79947 23.4148 1 22.4286 1H17.0714M1 15.2857H26M13.5 15.2857V21.5357M9.03571 15.2857L6.35714 21.5357M17.9643 15.2857L20.6429 21.5357" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

      <li class="menu-item">

            <path d="M11.7399 22.56L11.7399 11.9094L22.2389 11.9094M11.7399 1.25887L11.7389 11.9104L1.24097 11.9094" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>

      <li class="menu-item active">

  </nav>

  <script src="../js/main.js"></script>
  <script src="../js/Profile.js"></script>
</body>
</html>

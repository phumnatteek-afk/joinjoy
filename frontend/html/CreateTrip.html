<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JoinJoy — CreateTrip</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Kanit:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../css/homepage.css" />
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
</head>

<body>

    <div class="toast" id="toast"></div>

    <!-- ── HEADER ── -->
    <header class="header1">
        <div class="top-bar">
            <svg width="23" height="20" viewBox="0 0 23 20" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M1.25 18.25L11.25 9.75L21.25 18.25M21.25 1.25L11.2481 9.75L1.25 1.25"
                stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span>Create Trips</span>
            <button class="saver" id="btn-save" type="button">save</button>
        </div>
    </header>

    <!-- ── MAIN FORM ── -->
    <main class="create-content">

        <!-- Cover Photo — main.js จัดการ change event ให้แล้ว -->
        <div class="upload-section">
            <input type="file" id="cover-photo" accept="image/*" hidden />
            <label for="cover-photo" class="upload-box" id="drop-area">
                <div id="preview-content">
                    <div class="camera-icon-circle">
                        <iconify-icon icon="solar:camera-add-bold"></iconify-icon>
                    </div>
                    <p>Add Cover Photo</p>
                </div>
            </label>
        </div>

        <div class="form-container">

            <!-- Trip Title -->
            <div class="input-group">
                <label>Create Trip Title <span class="required">*</span></label>
                <input type="text" id="trip_name" placeholder="Enter trip title" class="main-input" />
            </div>

            <!-- Category — main.js จัดการ toggle ให้แล้ว -->
            <div class="category-selection-section">
                <div class="category-header-row">
                    <h3 class="category-label">Category</h3>
                </div>
                <p class="category-subtitle">Select your desired trip category.</p>
                <div class="category-chips-wrapper">
                    <button type="button" class="tag-chip" data-value="1-Day Trip">1-Day Trip</button>
                    <button type="button" class="tag-chip" data-value="Chill & Relaxed">Chill &amp; Relaxed</button>
                    <button type="button" class="tag-chip" data-value="Travel Group">Travel Group</button>
                    <button type="button" class="tag-chip" data-value="Beach Trips">Beach Trips</button>
                    <button type="button" class="tag-chip" data-value="Café Hopping">Café Hopping</button>
                    <button type="button" class="tag-chip" data-value="Nightlife / Party">Nightlife / Party</button>
                    <button type="button" class="tag-chip" data-value="Short Getaway">Short Getaway</button>
                    <button type="button" class="tag-chip" data-value="Food">Food</button>
                    <button type="button" class="tag-chip" data-value="Events">Events</button>
                    <button type="button" class="tag-chip" data-value="Concert">Concert</button>
                    <button type="button" class="tag-chip" data-value="Healing">Healing</button>
                    <button type="button" class="tag-chip" data-value="Backpacking">Backpacking</button>
                    <button type="button" class="tag-chip" data-value="Camping">Camping</button>
                </div>
            </div>

            <!-- Location / Budget / Member -->
            <div class="form-list">
                <div class="list-item">
                    <iconify-icon icon="solar:map-point-bold" class="list-icon pink"></iconify-icon>
                    <div class="list-text">
                        <label>Location <span class="required">*</span></label>
                        <input type="text" id="location_name" placeholder="Enter location" />
                    </div>
                    <iconify-icon icon="solar:alt-arrow-right-outline" class="arrow"></iconify-icon>
                </div>

                <div class="form-row-grid">
                    <div class="list-item no-border">
                        <iconify-icon icon="solar:banknote-2-bold" class="list-icon pink"></iconify-icon>
                        <div class="list-text select-wrapper">
                            <label>Budget</label>
                            <input type="text" id="budget_range" list="budget-options" class="select-input" placeholder="Enter or Select" />
                            <datalist id="budget-options">
                                <option value="500-1000"></option>
                                <option value="1001-3000"></option>
                                <option value="3001-5000"></option>
                            </datalist>
                            <iconify-icon icon="solar:alt-arrow-down-outline" class="dropdown-icon"></iconify-icon>
                        </div>
                    </div>

                    <div class="list-item no-border">
                        <iconify-icon icon="solar:users-group-rounded-bold" class="list-icon pink"></iconify-icon>
                        <div class="list-text select-wrapper">
                            <label>Member <span class="required">*</span></label>
                            <input type="number" id="max_member" list="member-options" class="select-input" placeholder="Enter or Select" min="1" />
                            <datalist id="member-options">
                                <option value="5"></option>
                                <option value="10"></option>
                                <option value="15"></option>
                                <option value="20"></option>
                            </datalist>
                            <iconify-icon icon="solar:alt-arrow-down-outline" class="dropdown-icon"></iconify-icon>
                        </div>
                    </div>
                </div>

                <!-- Date & Time -->
                <div class="datetime-range-section">
                    <label class="section-label">Date &amp; Time <span class="required">*</span></label>
                    <div class="range-container">
                        <div class="range-box">
                            <iconify-icon icon="solar:calendar-date-bold" class="pink-icon"></iconify-icon>
                            <input type="datetime-local" id="start_time" />
                        </div>
                        <span class="to-text">TO</span>
                        <div class="range-box">
                            <iconify-icon icon="solar:calendar-date-bold" class="pink-icon"></iconify-icon>
                            <input type="datetime-local" id="end_time" />
                        </div>
                    </div>
                </div>
            </div>

            <!-- Social Media -->
            <div class="input-group1">
                <div class="icon-contact">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24px" height="24px" viewBox="0 0 20 20">
                        <path fill="currentColor" d="M10 20a10 10 0 1 1 0-20a10 10 0 0 1 0 20m7.75-8a8 8 0 0 0 0-4h-3.82a29 29 0 0 1 0 4zm-.82 2h-3.22a14.4 14.4 0 0 1-.95 3.51A8.03 8.03 0 0 0 16.93 14m-8.85-2h3.84a24.6 24.6 0 0 0 0-4H8.08a24.6 24.6 0 0 0 0 4m.25 2c.41 2.4 1.13 4 1.67 4s1.26-1.6 1.67-4zm-6.08-2h3.82a29 29 0 0 1 0-4H2.25a8 8 0 0 0 0 4m.82 2a8.03 8.03 0 0 0 4.17 3.51c-.42-.96-.74-2.16-.95-3.51zm13.86-8a8.03 8.03 0 0 0-4.17-3.51c.42.96.74 2.16.95 3.51zm-8.6 0h3.34c-.41-2.4-1.13-4-1.67-4S8.74 3.6 8.33 6M3.07 6h3.22c.2-1.35.53-2.55.95-3.51A8.03 8.03 0 0 0 3.07 6"/>
                    </svg>
                </div>
                <label>Social Media</label>
                <input type="text" id="trip_detail" placeholder="Enter Your Social Media" class="main-input1" />
            </div>

            <!-- Description -->
            <div class="input-group">
                <label>Description</label>
                <textarea id="description" placeholder="Add trip description..." rows="4"></textarea>
            </div>

            <button type="button" class="btn-create-trip" id="btn-create-trip">
                Create Trip
            </button>

        </div>
    </main>

    <!-- ── NAV ── -->
    <nav id="mainnav" class="mainnav" aria-label="Main navigation">
        <ul class="mainmenu">
            <li class="menu-item">
                <a href="homepage.html">
                    <svg width="24" height="27" viewBox="0 0 24 27" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M3.93287 25.7504C2.31312 25.7504 1 24.4029 1 22.7391V10.6364C1 9.72201 1.40563 8.85576 2.1 8.28513L10.1671 1.66038C10.6826 1.23356 11.3308 1 12 1C12.6692 1 13.3174 1.23356 13.8329 1.66038L21.8986 8.28513C22.5944 8.85576 23 9.72201 23 10.6364V22.7391C23 24.4029 21.6869 25.7504 20.0671 25.7504H3.93287Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M8.5625 25.7505V18.188C8.5625 17.4586 8.85223 16.7592 9.36796 16.2434C9.88368 15.7277 10.5832 15.438 11.3125 15.438H12.6875C13.4168 15.438 14.1163 15.7277 14.632 16.2434C15.1478 16.7592 15.4375 17.4586 15.4375 18.188V25.7505" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>Home</span>
                </a>
            </li>
            <li class="menu-item">
                <a href="Board.html">
                    <svg width="27" height="23" viewBox="0 0 27 23" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M9.92857 1H4.57143C3.58519 1 2.78571 1.79947 2.78571 2.78571V15.2857H24.2143V2.78571C24.2143 1.79947 23.4148 1 22.4286 1H17.0714M1 15.2857H26M13.5 15.2857V21.5357M9.03571 15.2857L6.35714 21.5357M17.9643 15.2857L20.6429 21.5357" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>Board</span>
                </a>
            </li>
            <li class="menu-item active">
                <a href="CreateTrip.html">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M11.7399 22.56L11.7399 11.9094L22.2389 11.9094M11.7399 1.25887L11.7389 11.9104L1.24097 11.9094" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span>Create</span>
                </a>
            </li>
            <li class="menu-item">
                <a href="Profile.html">
                    <svg width="22" height="27" viewBox="0 0 22 27" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M11.0002 11C13.7617 11 16.0002 8.76142 16.0002 6C16.0002 3.23858 13.7617 1 11.0002 1C8.23882 1 6.00024 3.23858 6.00024 6C6.00024 8.76142 8.23882 11 11.0002 11Z" stroke="currentColor" stroke-width="2"/>
                        <path d="M21.0002 20.375C21.0002 23.4812 21.0002 26 11.0002 26C1.00024 26 1.00024 23.4812 1.00024 20.375C1.00024 17.2688 5.47774 14.75 11.0002 14.75C16.5227 14.75 21.0002 17.2688 21.0002 20.375Z" stroke="currentColor" stroke-width="2"/>
                    </svg>
                    <span>Profile</span>
                </a>
            </li>
        </ul>
    </nav>

    <!-- main.js ต้องโหลดก่อน script ด้านล่าง -->
    <script src="../js/main.js"></script>
    <script>
    // ─────────────────────────────────────────────────────────
    //  NOTE: coverInput, uploadBox และ category chips
    //  ถูกจัดการโดย main.js แล้ว — ไม่ต้องประกาศซ้ำที่นี่
    // ─────────────────────────────────────────────────────────

    const BASE_URL = 'http://localhost:3000/api';

    // ── Toast helper ─────────────────────────────────────────
    function showToast(msg, isError = false) {
        const toast = document.getElementById('toast');
        toast.textContent      = msg;
        toast.style.background = isError ? '#e74c3c' : '#2ecc71';
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // ── Parse budget "500-1000" → { budget_min, budget_max } ─
    function parseBudget(raw) {
        const cleaned = raw.replace(/,/g, '');
        const parts   = cleaned.split('-');
        if (parts.length === 2) {
            return { budget_min: Number(parts[0]) || null, budget_max: Number(parts[1]) || null };
        }
        const single = Number(cleaned) || null;
        return { budget_min: single, budget_max: single };
    }

    // ── ดึง category ที่ active จาก main.js (multi-select) ───
    function getSelectedCategories() {
        const actives = document.querySelectorAll('.category-chips-wrapper .tag-chip.active');
        return Array.from(actives).map(el => el.dataset.value || el.innerText.trim()).join(',');
    }

    // ── Submit ───────────────────────────────────────────────
    async function submitTrip() {
        const trip_name     = document.getElementById('trip_name').value.trim();
        const location_name = document.getElementById('location_name').value.trim();
        const max_member    = document.getElementById('max_member').value.trim();
        const start_time    = document.getElementById('start_time').value;
        const end_time      = document.getElementById('end_time').value;
        const budget_raw    = document.getElementById('budget_range').value.trim();
        const description   = document.getElementById('description').value.trim();
        const trip_detail   = document.getElementById('trip_detail').value.trim();
        const category      = getSelectedCategories();  // ดึงจาก main.js ที่ toggle ไว้แล้ว

        // Validate
        if (!trip_name)     return showToast('กรุณากรอกชื่อทริป', true);
        if (!location_name) return showToast('กรุณากรอกสถานที่', true);
        if (!max_member)    return showToast('กรุณากรอกจำนวนสมาชิก', true);
        if (!start_time)    return showToast('กรุณาเลือกวันเริ่มต้น', true);
        if (!end_time)      return showToast('กรุณาเลือกวันสิ้นสุด', true);
        if (new Date(end_time) <= new Date(start_time)) {
            return showToast('วันสิ้นสุดต้องมาหลังวันเริ่มต้น', true);
        }

        const { budget_min, budget_max } = budget_raw
            ? parseBudget(budget_raw)
            : { budget_min: null, budget_max: null };

        // FormData — ไม่ส่ง creator_id เพราะ backend ดึงจาก session เอง
        const formData = new FormData();
        formData.append('trip_name',     trip_name);
        formData.append('location_name', location_name);
        formData.append('max_member',    max_member);
        formData.append('start_time',    start_time);
        formData.append('end_time',      end_time);
        if (category)    formData.append('category',    category);
        if (budget_min)  formData.append('budget_min',  budget_min);
        if (budget_max)  formData.append('budget_max',  budget_max);
        if (description) formData.append('description', description);
        if (trip_detail) formData.append('trip_detail', trip_detail);

        // รูปปก — ดึงจาก input ที่ main.js ใช้อยู่แล้ว
        const coverFile = document.getElementById('cover-photo').files[0];
        if (coverFile) formData.append('cover_image', coverFile);

        const btnCreate = document.getElementById('btn-create-trip');
        btnCreate.disabled    = true;
        btnCreate.textContent = 'กำลังบันทึก...';

        try {
            const res = await fetch(`${BASE_URL}/trips`, {
                method: 'POST',
                body: formData,
                credentials: 'include'  // ส่ง session cookie ไปด้วย
            });

            if (res.status === 401) {
                showToast('กรุณา login ก่อนสร้างทริป', true);
                setTimeout(() => window.location.href = '/html/homelogin.html', 1500);
                return;
            }

            const data = await res.json();
            if (data.success) {
                showToast('✅ สร้างทริปสำเร็จ!');
                setTimeout(() => window.location.href = 'homepage.html', 1500);
            } else {
                showToast(data.error || 'เกิดข้อผิดพลาด', true);
            }
        } catch (err) {
            console.error(err);
            showToast('ไม่สามารถเชื่อมต่อ server ได้', true);
        } finally {
            btnCreate.disabled    = false;
            btnCreate.textContent = 'Create Trip';
        }
    }

    document.getElementById('btn-create-trip').addEventListener('click', submitTrip);
    document.getElementById('btn-save').addEventListener('click', submitTrip);
    </script>
</body>
</html>
